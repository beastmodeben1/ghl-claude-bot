services:
  - type: web
    name: closers-hub-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server-multi-tenant.js
    
  - type: cron
    name: daily-followup
    env: node
    plan: starter
    # 16:00 UTC = ~11am CDT / 10am CST — inside the engine's 9am-8pm business-hours window.
    schedule: "0 16 * * *"
    buildCommand: npm install
    startCommand: node cron-follow-up.js
