services:
  - type: web
    name: closers-hub-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server-multi-tenant.js
    
  - type: cron
    name: daily-followup
    env: node
    plan: starter
    schedule: "0 10 * * *"
    buildCommand: npm install
    startCommand: node cron-follow-up.js
